<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1400" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: bold; fill: #333; }
      .subtitle { font-size: 16px; fill: #555; }
      .label { font-size: 13px; fill: #666; }
      .small { font-size: 11px; fill: #888; }
      .section-title { font-size: 18px; font-weight: bold; fill: #333; }
      .placeholder { fill: #E8E8E8; stroke: #CCC; stroke-width: 1; }
      .card { fill: white; stroke: #DDD; stroke-width: 1; rx: 8; }
      .header-bg { fill: #2C3E50; }
      .footer-bg { fill: #34495E; }
      .divider { stroke: #E0E0E0; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1400" fill="#F8F9FA"/>



  <!-- ========== HEADER ========== -->
  <rect x="0" y="40" width="1200" height="70" class="header-bg"/>
  <rect x="40" y="52" width="45" height="45" rx="8" fill="#F39C12"/>
  <text x="63" y="82" text-anchor="middle" font-size="18" fill="white" font-weight="bold">💡</text>
  <text x="100" y="72" font-size="18" fill="white" font-weight="bold">ЛампоМаркет</text>
  <text x="100" y="88" font-size="10" fill="#BDC3C7">Завод-производитель</text>
  <text x="380" y="80" font-size="14" fill="#BDC3C7">Главная</text>
  <text x="470" y="80" font-size="14" fill="#BDC3C7">Каталог</text>
  <text x="560" y="80" font-size="14" fill="#ECF0F1" font-weight="bold" text-decoration="underline">О компании</text>
  <text x="680" y="80" font-size="14" fill="#BDC3C7">Контакты</text>
  <rect x="1050" y="58" width="110" height="36" rx="18" fill="none" stroke="#BDC3C7" stroke-width="1"/>
  <text x="1080" y="81" font-size="16">🛒</text>
  <text x="1100" y="80" font-size="13" fill="#ECF0F1">Корзина (0)</text>

  <!-- ========== BREADCRUMB ========== -->
  <text x="60" y="140" font-size="13" fill="#4A90D9">Главная</text>
  <text x="115" y="140" font-size="13" fill="#999"> / </text>
  <text x="130" y="140" font-size="13" fill="#333" font-weight="bold">О компании</text>

  <!-- ========== HERO SECTION ========== -->
  <rect x="40" y="160" width="1120" height="250" rx="12" fill="#EBF5FB" stroke="#AED6F1" stroke-width="1"/>
  
  <rect x="70" y="185" width="300" height="200" rx="8" class="placeholder"/>
  <text x="220" y="290" text-anchor="middle" class="label">[ Фото завода ]</text>

  <text x="410" y="220" font-size="28" fill="#2C3E50" font-weight="bold">О нашем заводе</text>
  <text x="410" y="250" font-size="14" fill="#555">Мы — завод-производитель светотехнической</text>
  <text x="410" y="270" font-size="14" fill="#555">продукции с многолетним опытом работы.</text>
  <text x="410" y="290" font-size="14" fill="#555">Производим лампы всех типов: LED, филаментные,</text>
  <text x="410" y="310" font-size="14" fill="#555">галогенные и специального назначения.</text>


  <!-- ========== ABOUT SECTIONS ========== -->
  <text x="60" y="450" class="section-title" font-size="22">🏭 О производстве</text>
  <line x1="60" y1="460" x2="1140" y2="460" class="divider"/>

  <rect x="60" y="480" width="1080" height="160" rx="8" fill="white" stroke="#E8E8E8" stroke-width="1"/>
  <text x="90" y="510" font-size="14" fill="#555">Наш завод расположен в г. Москва и оснащён современным оборудованием для</text>
  <text x="90" y="530" font-size="14" fill="#555">производства светодиодных ламп. Мы контролируем каждый этап — от разработки</text>
  <text x="90" y="550" font-size="14" fill="#555">до упаковки готовой продукции.</text>
  
  <text x="90" y="580" font-size="14" fill="#555" font-weight="bold">Наши преимущества:</text>
  <text x="90" y="600" font-size="13" fill="#666">• Собственная производственная линия • Лаборатория контроля качества</text>
  <text x="90" y="620" font-size="13" fill="#666">• Сертификация продукции ЕАС/ГОСТ • Оптовые поставки для бизнеса</text>

  <!-- ========== DELIVERY INFO ========== -->
  <text x="60" y="690" class="section-title" font-size="22">🚚 Условия курьерской доставки</text>
  <line x1="60" y1="700" x2="1140" y2="700" class="divider"/>

  <!-- Delivery cards -->
  <g transform="translate(60, 720)">
    <rect width="340" height="160" rx="8" fill="white" stroke="#E8E8E8" stroke-width="1"/>
    <text x="170" y="35" text-anchor="middle" font-size="32">📦</text>
    <text x="170" y="60" text-anchor="middle" font-size="15" fill="#333" font-weight="bold">Курьерская доставка</text>
    <text x="170" y="85" text-anchor="middle" font-size="13" fill="#666">По Москве и МО</text>
    <text x="170" y="105" text-anchor="middle" font-size="13" fill="#666">Срок: 1-2 рабочих дня</text>
    <text x="170" y="130" text-anchor="middle" font-size="18" fill="#27AE60" font-weight="bold">от 300 ₽</text>
    <text x="170" y="148" text-anchor="middle" font-size="11" fill="#999">Бесплатно от 5000 ₽</text>
  </g>

  <g transform="translate(430, 720)">
    <rect width="340" height="160" rx="8" fill="white" stroke="#E8E8E8" stroke-width="1"/>
    <text x="170" y="35" text-anchor="middle" font-size="32">🏢</text>
    <text x="170" y="60" text-anchor="middle" font-size="15" fill="#333" font-weight="bold">Самовывоз с завода</text>
    <text x="170" y="85" text-anchor="middle" font-size="13" fill="#666">г. Москва, ул. Заводская, 1</text>
    <text x="170" y="105" text-anchor="middle" font-size="13" fill="#666">Пн-Пт: 9:00 — 18:00</text>
    <text x="170" y="130" text-anchor="middle" font-size="18" fill="#27AE60" font-weight="bold">Бесплатно</text>
    <text x="170" y="148" text-anchor="middle" font-size="11" fill="#999">Готово в день заказа</text>
  </g>

  <g transform="translate(800, 720)">
    <rect width="340" height="160" rx="8" fill="white" stroke="#E8E8E8" stroke-width="1"/>
    <text x="170" y="35" text-anchor="middle" font-size="32">🚛</text>
    <text x="170" y="60" text-anchor="middle" font-size="15" fill="#333" font-weight="bold">Доставка по России</text>
    <text x="170" y="85" text-anchor="middle" font-size="13" fill="#666">Транспортной компанией</text>
    <text x="170" y="105" text-anchor="middle" font-size="13" fill="#666">Срок: 3-7 рабочих дней</text>
    <text x="170" y="130" text-anchor="middle" font-size="18" fill="#27AE60" font-weight="bold">от 500 ₽</text>
    <text x="170" y="148" text-anchor="middle" font-size="11" fill="#999">Расчёт при оформлении</text>
  </g>

  <!-- ========== CONTACTS ========== -->
  <text x="60" y="935" class="section-title" font-size="22">📞 Контактная информация</text>
  <line x1="60" y1="945" x2="1140" y2="945" class="divider"/>

  <rect x="60" y="965" width="530" height="260" rx="8" fill="white" stroke="#E8E8E8" stroke-width="1"/>
  
  <text x="90" y="1000" font-size="15" fill="#333" font-weight="bold">Реквизиты и контакты</text>
  <line x1="90" y1="1010" x2="570" y2="1010" class="divider"/>
  
  <text x="90" y="1035" font-size="13" fill="#888">Адрес:</text>
  <text x="220" y="1035" font-size="13" fill="#333">г. Москва, ул. Заводская, д. 1</text>
  <text x="90" y="1060" font-size="13" fill="#888">Телефон:</text>
  <text x="220" y="1060" font-size="13" fill="#4A90D9">+7 (495) 123-45-67</text>
  <text x="90" y="1085" font-size="13" fill="#888">Email:</text>
  <text x="220" y="1085" font-size="13" fill="#4A90D9">info@lampomarket.ru</text>
  <text x="90" y="1110" font-size="13" fill="#888">Режим работы:</text>
  <text x="220" y="1110" font-size="13" fill="#333">Пн-Пт: 9:00 — 18:00</text>
  <text x="90" y="1135" font-size="13" fill="#888">ИНН:</text>
  <text x="220" y="1135" font-size="13" fill="#333">7712345678</text>
  <text x="90" y="1160" font-size="13" fill="#888">ОГРН:</text>
  <text x="220" y="1160" font-size="13" fill="#333">1027700123456</text>



  <!-- Map placeholder -->
  <rect x="620" y="965" width="520" height="260" rx="8" class="placeholder"/>
  <text x="880" y="1080" text-anchor="middle" font-size="16" fill="#AAA">[ Карта — Яндекс.Карты ]</text>
  <text x="880" y="1105" text-anchor="middle" font-size="12" fill="#AAA">📍 г. Москва, ул. Заводская, 1</text>
  <text x="880" y="1125" text-anchor="middle" class="small">Встраиваемый виджет</text>

  <!-- ========== FOOTER ========== -->
  <rect x="0" y="1250" width="1200" height="150" class="footer-bg"/>
  <text x="60" y="1290" font-size="16" fill="white" font-weight="bold">ЛампоМаркет</text>
  <text x="60" y="1310" font-size="12" fill="#BDC3C7">© 2026 Завод-производитель светотехники</text>
  <text x="400" y="1285" font-size="13" fill="#ECF0F1" font-weight="bold">Навигация</text>
  <text x="400" y="1305" font-size="12" fill="#BDC3C7">Каталог · О компании · Контакты</text>
  <text x="700" y="1285" font-size="13" fill="#ECF0F1" font-weight="bold">Контакты</text>
  <text x="700" y="1305" font-size="12" fill="#BDC3C7">📞 +7 (495) 123-45-67 · 📧 info@lampomarket.ru</text>


</svg>
