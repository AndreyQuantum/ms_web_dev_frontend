  <rect x="855" y="732" width="80" height="20" rx="10" fill="#E8F8F5"/>
  <text x="895" y="746" text-anchor="middle" font-size="10" fill="#27AE60">Доставлен</text>
  <text x="1030" y="745" font-size="12" fill="#333">7</text>

  <!-- Row 4 -->
  <text x="300" y="775" font-size="12" fill="#4A90D9">#ORD-2844</text>
  <text x="440" y="775" font-size="12" fill="#333">company@biz.ru</text>
  <text x="620" y="775" font-size="12" fill="#666">11.04.2026</text>
