  <text x="1030" y="685" font-size="12" fill="#333">3</text>

  <!-- Row 2 -->
  <text x="300" y="715" font-size="12" fill="#4A90D9">#ORD-2846</text>
  <text x="440" y="715" font-size="12" fill="#333">anna@gmail.com</text>
  <text x="620" y="715" font-size="12" fill="#666">12.04.2026</text>
  <text x="750" y="715" font-size="12" fill="#333" font-weight="bold">1 890 ₽</text>
  <rect x="855" y="702" width="80" height="20" rx="10" fill="#FEF9E7"/>
  <text x="895" y="716" text-anchor="middle" font-size="10" fill="#F39C12">В работе</text>
  <text x="1030" y="715" font-size="12" fill="#333">2</text>

  <!-- Row 3 -->
  <text x="300" y="745" font-size="12" fill="#4A90D9">#ORD-2845</text>
  <text x="440" y="745" font-size="12" fill="#333">petrov@ya.ru</text>
