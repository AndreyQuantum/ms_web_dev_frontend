<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1100" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .small { font-size: 11px; fill: #888; }
      .sidebar-bg { fill: #1A252F; }
      .sidebar-item { fill: none; }
      .sidebar-active { fill: #4A90D9; rx: 6; }
      .card-stat { fill: white; stroke: #E0E0E0; stroke-width: 1; rx: 12; }
      .divider { stroke: #E0E0E0; stroke-width: 1; }
      .chart-bg { fill: white; stroke: #E0E0E0; stroke-width: 1; rx: 8; }
    </style>
  </defs>

  <rect width="1200" height="1100" fill="#F0F2F5"/>

  <!-- ========== ADMIN SIDEBAR ========== -->
  <rect x="0" y="35" width="240" height="1065" class="sidebar-bg"/>
  
  <!-- Logo -->
  <rect x="20" y="50" width="200" height="60" rx="8" fill="#2C3E50"/>
  <text x="50" y="82" font-size="16" fill="white" font-weight="bold">💡 ЛампоМаркет</text>
  <text x="50" y="100" font-size="10" fill="#7F8C8D">Панель администратора</text>

  <!-- Admin info -->
