  <text x="50" y="220" font-size="14" fill="white" font-weight="bold">📊 Дашборд</text>
  
  <rect x="15" y="245" width="210" height="40" class="sidebar-item"/>
  <text x="50" y="270" font-size="14" fill="#95A5A6">📦 Товары</text>
  
  <rect x="15" y="295" width="210" height="40" class="sidebar-item"/>
  <text x="50" y="320" font-size="14" fill="#95A5A6">📥 Импорт</text>
  
