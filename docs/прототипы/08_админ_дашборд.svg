  <circle cx="45" cy="150" r="15" fill="#4A90D9"/>
  <text x="45" y="155" text-anchor="middle" font-size="14" fill="white">A</text>
  <text x="70" y="145" font-size="12" fill="white">Admin</text>
  <text x="70" y="161" font-size="10" fill="#7F8C8D">admin@lampomarket.ru</text>

