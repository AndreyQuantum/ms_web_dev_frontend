  <text x="440" y="685" font-size="12" fill="#333">ivan@mail.ru</text>
  <text x="620" y="685" font-size="12" fill="#666">12.04.2026</text>
  <text x="750" y="685" font-size="12" fill="#333" font-weight="bold">4 520 ₽</text>
  <rect x="855" y="672" width="80" height="20" rx="10" fill="#E8F8F5"/>
