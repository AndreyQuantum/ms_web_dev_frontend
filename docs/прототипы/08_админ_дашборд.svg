  <text x="50" y="370" font-size="14" fill="#95A5A6">📋 Справочники</text>

  <line x1="30" y1="410" x2="220" y2="410" stroke="#2C3E50" stroke-width="1"/>

  <rect x="15" y="425" width="210" height="40" class="sidebar-item"/>
  <text x="50" y="450" font-size="14" fill="#95A5A6">🛒 Заказы</text>

  <line x1="30" y1="485" x2="220" y2="485" stroke="#2C3E50" stroke-width="1"/>

