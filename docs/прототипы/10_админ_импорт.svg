<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .small { font-size: 11px; fill: #888; }
      .sidebar-bg { fill: #1A252F; }
      .sidebar-active { fill: #4A90D9; rx: 6; }
      .divider { stroke: #E0E0E0; stroke-width: 1; }
      .input { fill: white; stroke: #CCC; stroke-width: 1; rx: 4; }
      .btn { fill: #4A90D9; rx: 6; }
      .btn-success { fill: #27AE60; rx: 6; }
    </style>
  </defs>

  <rect width="1200" height="1000" fill="#F0F2F5"/>

  <!-- ========== SIDEBAR ========== -->
  <rect x="0" y="35" width="240" height="965" class="sidebar-bg"/>
  <rect x="20" y="50" width="200" height="60" rx="8" fill="#2C3E50"/>
  <text x="50" y="82" font-size="16" fill="white" font-weight="bold">💡 ЛампоМаркет</text>
  <text x="50" y="100" font-size="10" fill="#7F8C8D">Панель администратора</text>

  <rect x="15" y="130" width="210" height="40" fill="none"/>
  <text x="50" y="155" font-size="14" fill="#95A5A6">📊 Дашборд</text>
  <rect x="15" y="180" width="210" height="40" fill="none"/>
  <text x="50" y="205" font-size="14" fill="#95A5A6">📦 Товары</text>
  <rect x="15" y="230" width="210" height="40" class="sidebar-active"/>
  <text x="50" y="255" font-size="14" fill="white" font-weight="bold">📥 Импорт</text>
  <rect x="15" y="280" width="210" height="40" fill="none"/>
  <text x="50" y="305" font-size="14" fill="#95A5A6">📋 Справочники</text>

  <!-- ========== TOP BAR ========== -->
  <rect x="240" y="35" width="960" height="55" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="270" y="68" font-size="18" fill="#2C3E50" font-weight="bold">📥 Массовый импорт товаров</text>


  <!-- ========== MAIN CONTENT ========== -->

  <!-- Upload area -->
  <rect x="265" y="110" width="910" height="250" rx="12" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="280" y="140" font-size="16" fill="#333" font-weight="bold">Шаг 1: Загрузка файла</text>
  <line x1="280" y1="150" x2="1155" y2="150" class="divider"/>

  <!-- Drag and drop zone -->
  <rect x="295" y="165" width="860" height="140" rx="12" fill="#F8FAFE" stroke="#4A90D9" stroke-width="2" stroke-dasharray="8"/>
  
  <text x="725" y="210" text-anchor="middle" font-size="36">📁</text>
  <text x="725" y="240" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">Перетащите файл сюда или нажмите для выбора</text>
  <text x="725" y="260" text-anchor="middle" font-size="13" fill="#888">Поддерживаемые форматы: .csv, .xlsx, .json</text>
  <text x="725" y="280" text-anchor="middle" font-size="12" fill="#999">Максимальный размер файла: 10 МБ</text>
  
  <rect x="660" y="290" width="130" height="35" class="btn"/>
  <text x="725" y="313" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Выбрать файл</text>

  <!-- Uploaded file info -->
  <rect x="295" y="320" width="860" height="30" rx="4" fill="#E8F8F5" stroke="#27AE60" stroke-width="1"/>
  <text x="315" y="340" font-size="12" fill="#27AE60">✓ Файл загружен: products_import_april.csv (245 KB) — 150 строк обнаружено</text>

  <!-- ========== COLUMN MAPPING ========== -->
  <rect x="265" y="380" width="910" height="280" rx="12" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="280" y="410" font-size="16" fill="#333" font-weight="bold">Шаг 2: Сопоставление колонок</text>
  <text x="280" y="428" class="small">Укажите, какие колонки файла соответствуют полям товара</text>
  <line x1="280" y1="438" x2="1155" y2="438" class="divider"/>

  <!-- Mapping table header -->
  <rect x="295" y="450" width="840" height="30" rx="4" fill="#F0F2F5"/>
  <text x="320" y="470" font-size="12" fill="#666" font-weight="bold">Колонка в файле</text>
  <text x="530" y="470" font-size="12" fill="#666" font-weight="bold">→</text>
  <text x="570" y="470" font-size="12" fill="#666" font-weight="bold">Поле товара</text>
  <text x="830" y="470" font-size="12" fill="#666" font-weight="bold">Обязательное</text>
  <text x="960" y="470" font-size="12" fill="#666" font-weight="bold">Пример</text>

  <!-- Mapping rows -->
  <text x="320" y="505" font-size="12" fill="#333">«Наименование»</text>
  <text x="530" y="505" font-size="12" fill="#4A90D9">→</text>
  <rect x="570" y="490" width="200" height="26" class="input"/>
  <text x="585" y="508" font-size="11" fill="#333">Название ▾</text>
  <text x="845" y="505" font-size="12" fill="#27AE60">✓ Да</text>
  <text x="960" y="505" font-size="10" fill="#999">LED Лампа E27</text>

  <text x="320" y="540" font-size="12" fill="#333">«Цена»</text>
  <text x="530" y="540" font-size="12" fill="#4A90D9">→</text>
  <rect x="570" y="525" width="200" height="26" class="input"/>
  <text x="585" y="543" font-size="11" fill="#333">Цена ▾</text>
  <text x="845" y="540" font-size="12" fill="#27AE60">✓ Да</text>
  <text x="960" y="540" font-size="10" fill="#999">200.00</text>

  <text x="320" y="575" font-size="12" fill="#333">«Количество»</text>
  <text x="530" y="575" font-size="12" fill="#4A90D9">→</text>
  <rect x="570" y="560" width="200" height="26" class="input"/>
  <text x="585" y="578" font-size="11" fill="#333">Количество ▾</text>
  <text x="845" y="575" font-size="12" fill="#27AE60">✓ Да</text>
  <text x="960" y="575" font-size="10" fill="#999">245</text>

  <text x="320" y="610" font-size="12" fill="#333">«Категория»</text>
  <text x="530" y="610" font-size="12" fill="#4A90D9">→</text>
  <rect x="570" y="595" width="200" height="26" class="input"/>
  <text x="585" y="613" font-size="11" fill="#333">Категория ▾</text>
  <text x="845" y="610" font-size="12" fill="#888">Нет</text>
  <text x="960" y="610" font-size="10" fill="#999">LED-лампы</text>

  <text x="320" y="645" font-size="12" fill="#333">«Яркость»</text>
  <text x="530" y="645" font-size="12" fill="#4A90D9">→</text>
  <rect x="570" y="630" width="200" height="26" class="input"/>
  <text x="585" y="648" font-size="11" fill="#333">Яркость (лм) ▾</text>
  <text x="845" y="645" font-size="12" fill="#888">Нет</text>
  <text x="960" y="645" font-size="10" fill="#999">800</text>

  <!-- ========== PREVIEW + IMPORT ========== -->
  <rect x="265" y="680" width="910" height="210" rx="12" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  
  <text x="280" y="710" font-size="16" fill="#333" font-weight="bold">Шаг 3: Предпросмотр и импорт</text>
  <line x1="280" y1="720" x2="1155" y2="720" class="divider"/>

  <!-- Preview table -->
  <rect x="295" y="735" width="840" height="25" rx="4" fill="#F0F2F5"/>
  <text x="310" y="752" font-size="10" fill="#666" font-weight="bold">#</text>
  <text x="340" y="752" font-size="10" fill="#666" font-weight="bold">Название</text>
  <text x="530" y="752" font-size="10" fill="#666" font-weight="bold">Цена</text>
  <text x="600" y="752" font-size="10" fill="#666" font-weight="bold">Кол-во</text>
  <text x="670" y="752" font-size="10" fill="#666" font-weight="bold">Категория</text>
  <text x="780" y="752" font-size="10" fill="#666" font-weight="bold">Яркость</text>
  <text x="860" y="752" font-size="10" fill="#666" font-weight="bold">Статус</text>

  <text x="310" y="778" font-size="11" fill="#999">1</text>
  <text x="340" y="778" font-size="11" fill="#333">LED Лампа E27 10W</text>
  <text x="530" y="778" font-size="11" fill="#333">200 ₽</text>
  <text x="600" y="778" font-size="11" fill="#333">245</text>
  <text x="670" y="778" font-size="11" fill="#333">LED-лампы</text>
  <text x="780" y="778" font-size="11" fill="#333">800 лм</text>
  <rect x="855" y="766" width="40" height="16" rx="8" fill="#E8F8F5"/>
  <text x="875" y="778" text-anchor="middle" font-size="8" fill="#27AE60">OK</text>

  <text x="310" y="800" font-size="11" fill="#999">2</text>
  <text x="340" y="800" font-size="11" fill="#333">Филамент E14 5W</text>
  <text x="530" y="800" font-size="11" fill="#333">180 ₽</text>
  <text x="600" y="800" font-size="11" fill="#333">120</text>
  <text x="670" y="800" font-size="11" fill="#333">Филаментные</text>
  <text x="780" y="800" font-size="11" fill="#333">600 лм</text>
  <rect x="855" y="788" width="40" height="16" rx="8" fill="#E8F8F5"/>
  <text x="875" y="800" text-anchor="middle" font-size="8" fill="#27AE60">OK</text>

  <text x="310" y="822" font-size="11" fill="#999">3</text>
  <text x="340" y="822" font-size="11" fill="#E74C3C">—</text>
  <text x="530" y="822" font-size="11" fill="#333">abc</text>
  <text x="600" y="822" font-size="11" fill="#333">50</text>
  <text x="670" y="822" font-size="11" fill="#333">Неизвестная</text>
  <text x="780" y="822" font-size="11" fill="#333">—</text>
  <rect x="855" y="810" width="55" height="16" rx="8" fill="#FDEDEC"/>
  <text x="882" y="822" text-anchor="middle" font-size="8" fill="#E74C3C">Ошибка</text>

  <text x="295" y="850" font-size="12" fill="#27AE60" font-weight="bold">✓ 148 записей готовы к импорту</text>
  <text x="550" y="850" font-size="12" fill="#E74C3C">⚠ 2 записи с ошибками (будут пропущены)</text>

  <!-- Import buttons -->
  <rect x="295" y="860" width="180" height="40" class="btn-success"/>
  <text x="385" y="886" text-anchor="middle" font-size="14" fill="white" font-weight="bold">📥 Импортировать</text>
  
  <rect x="490" y="860" width="150" height="40" rx="6" fill="white" stroke="#CCC" stroke-width="1"/>
  <text x="565" y="886" text-anchor="middle" font-size="14" fill="#666">Отмена</text>

</svg>
