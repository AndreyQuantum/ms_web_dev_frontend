<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: bold; fill: #333; }
      .small { font-size: 11px; fill: #888; }
      .btn { fill: #4A90D9; rx: 6; }
      .btn-text { font-size: 14px; fill: white; font-weight: bold; }
      .input { fill: white; stroke: #CCC; stroke-width: 1; rx: 4; }
      .divider { stroke: #E0E0E0; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#F8F9FA"/>


  <!-- ========== HEADER (minimal) ========== -->
  <rect x="0" y="40" width="1200" height="70" fill="#2C3E50"/>
  <rect x="40" y="52" width="45" height="45" rx="8" fill="#F39C12"/>
  <text x="63" y="82" text-anchor="middle" font-size="18" fill="white" font-weight="bold">💡</text>
  <text x="100" y="72" font-size="18" fill="white" font-weight="bold">ЛампоМаркет</text>
  <text x="100" y="88" font-size="10" fill="#BDC3C7">Завод-производитель</text>
  <text x="380" y="80" font-size="14" fill="#BDC3C7">Главная</text>
  <text x="470" y="80" font-size="14" fill="#BDC3C7">Каталог</text>

  <!-- ========== CENTERED LOGIN FORM ========== -->
  <rect x="350" y="170" width="500" height="530" rx="16" fill="white" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Lock icon -->
  <circle cx="600" cy="230" r="40" fill="#EBF5FB" stroke="#4A90D9" stroke-width="2"/>
  <text x="600" y="243" text-anchor="middle" font-size="32">🔐</text>

  <text x="600" y="295" text-anchor="middle" font-size="22" fill="#2C3E50" font-weight="bold">Вход в админ-панель</text>
  <text x="600" y="318" text-anchor="middle" font-size="13" fill="#888">Только для администраторов магазина</text>

  <!-- Alert for regular users -->
  <rect x="385" y="335" width="430" height="40" rx="6" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="405" y="360" font-size="12" fill="#E74C3C">⚠ Для обычных пользователей: доступ запрещён (403). Перенаправление на главную.</text>

  <!-- Login field -->
  <text x="395" y="405" font-size="14" fill="#333" font-weight="bold">Логин</text>

  <rect x="385" y="428" width="430" height="48" class="input" rx="8"/>
  <text x="410" y="457" font-size="14" fill="#AAA">Введите логин администратора</text>

  <!-- Password field -->
  <text x="395" y="505" font-size="14" fill="#333" font-weight="bold">Пароль</text>

  <rect x="385" y="528" width="430" height="48" class="input" rx="8"/>
  <text x="410" y="557" font-size="14" fill="#AAA">••••••••</text>
  <text x="785" y="557" font-size="14" fill="#999" text-anchor="end">👁</text>

  <!-- Login button -->
  <rect x="385" y="600" width="430" height="50" class="btn" rx="8"/>
  <text x="600" y="631" text-anchor="middle" font-size="16" fill="white" font-weight="bold">Войти →</text>

  <!-- Response info -->


  

</svg>
