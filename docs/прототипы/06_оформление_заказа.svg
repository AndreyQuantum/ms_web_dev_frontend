<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1400" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: bold; fill: #333; }
      .subtitle { font-size: 16px; fill: #555; }
      .label { font-size: 13px; fill: #666; }
      .small { font-size: 11px; fill: #888; }
      .btn-text { font-size: 14px; fill: white; font-weight: bold; }
      .section-title { font-size: 18px; font-weight: bold; fill: #333; }
      .placeholder { fill: #E8E8E8; stroke: #CCC; stroke-width: 1; }
      .card { fill: white; stroke: #DDD; stroke-width: 1; rx: 8; }
      .btn { fill: #4A90D9; rx: 6; }
      .btn-success { fill: #27AE60; rx: 6; }
      .header-bg { fill: #2C3E50; }
      .footer-bg { fill: #34495E; }
      .divider { stroke: #E0E0E0; stroke-width: 1; }
      .input { fill: white; stroke: #CCC; stroke-width: 1; rx: 4; }
      .input-focus { fill: white; stroke: #4A90D9; stroke-width: 2; rx: 4; }
      .required { fill: #E74C3C; font-size: 14px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1400" fill="#F8F9FA"/>



  <!-- ========== HEADER ========== -->
  <rect x="0" y="40" width="1200" height="70" class="header-bg"/>
  <rect x="40" y="52" width="45" height="45" rx="8" fill="#F39C12"/>
  <text x="63" y="82" text-anchor="middle" font-size="18" fill="white" font-weight="bold">💡</text>
  <text x="100" y="72" font-size="18" fill="white" font-weight="bold">ЛампоМаркет</text>
  <text x="100" y="88" font-size="10" fill="#BDC3C7">Завод-производитель</text>
  <text x="380" y="80" font-size="14" fill="#BDC3C7">Главная</text>
  <text x="470" y="80" font-size="14" fill="#BDC3C7">Каталог</text>
  <text x="560" y="80" font-size="14" fill="#BDC3C7">О компании</text>
  <text x="670" y="80" font-size="14" fill="#BDC3C7">Контакты</text>
  <rect x="1050" y="58" width="110" height="36" rx="18" fill="none" stroke="#BDC3C7" stroke-width="1"/>
  <text x="1080" y="81" font-size="16">🛒</text>
  <text x="1100" y="80" font-size="13" fill="#ECF0F1">Корзина (3)</text>

  <!-- ========== BREADCRUMB ========== -->
  <text x="60" y="140" font-size="13" fill="#4A90D9">Главная</text>
  <text x="115" y="140" font-size="13" fill="#999"> / </text>
  <text x="128" y="140" font-size="13" fill="#4A90D9">Корзина</text>
  <text x="180" y="140" font-size="13" fill="#999"> / </text>
  <text x="193" y="140" font-size="13" fill="#333" font-weight="bold">Оформление заказа</text>

  <!-- ========== PAGE TITLE ========== -->
  <text x="60" y="180" class="title">📋 Оформление заказа</text>

  <!-- Steps indicator -->
  <g transform="translate(60, 200)">
    <circle cx="20" cy="15" r="15" fill="#27AE60"/>
    <text x="20" y="20" text-anchor="middle" font-size="12" fill="white" font-weight="bold">✓</text>
    <text x="45" y="20" font-size="12" fill="#27AE60" font-weight="bold">Корзина</text>
    <line x1="100" y1="15" x2="200" y2="15" stroke="#27AE60" stroke-width="2"/>
    <circle cx="220" cy="15" r="15" fill="#4A90D9"/>
    <text x="220" y="20" text-anchor="middle" font-size="12" fill="white" font-weight="bold">2</text>
    <text x="245" y="20" font-size="12" fill="#4A90D9" font-weight="bold">Контактные данные</text>
    <line x1="400" y1="15" x2="500" y2="15" stroke="#DDD" stroke-width="2"/>
    <circle cx="520" cy="15" r="15" fill="#DDD"/>
    <text x="520" y="20" text-anchor="middle" font-size="12" fill="white" font-weight="bold">3</text>
    <text x="545" y="20" font-size="12" fill="#999">Подтверждение</text>
  </g>

  <!-- ========== MAIN FORM (LEFT) ========== -->
  <rect x="60" y="245" width="720" height="650" rx="12" fill="white" stroke="#E0E0E0" stroke-width="1"/>

  <text x="90" y="285" font-size="18" fill="#333" font-weight="bold">Контактные данные</text>
  <text x="90" y="305" font-size="12" fill="#888">Личный кабинет не создаётся. Данные используются только для связи по заказу.</text>
  <line x1="90" y1="315" x2="750" y2="315" class="divider"/>

  <!-- Email field -->
  <text x="90" y="345" font-size="14" fill="#333" font-weight="bold">Email <tspan class="required">*</tspan></text>

  <rect x="90" y="370" width="660" height="44" class="input-focus"/>
  <text x="110" y="397" font-size="14" fill="#333">ivan@example.com</text>
  <text x="720" y="397" font-size="14" fill="#27AE60" text-anchor="end">✓</text>

  <!-- Phone field -->
  <text x="90" y="440" font-size="14" fill="#333" font-weight="bold">Телефон <tspan class="required">*</tspan></text>

  <rect x="90" y="465" width="660" height="44" class="input"/>
  <text x="110" y="492" font-size="14" fill="#AAA">+7 (___) ___-__-__</text>

  <!-- Comment field -->
  <text x="90" y="540" font-size="14" fill="#333" font-weight="bold">Комментарий к заказу</text>

  <rect x="90" y="565" width="660" height="100" class="input"/>
  <text x="110" y="590" font-size="13" fill="#AAA">Укажите пожелания по доставке, удобное время...</text>

  <!-- Delivery info section -->
  <line x1="90" y1="690" x2="750" y2="690" class="divider"/>
  <text x="90" y="720" font-size="18" fill="#333" font-weight="bold">🚚 Информация о доставке</text>

  <rect x="90" y="735" width="300" height="50" rx="8" fill="#EBF5FB" stroke="#4A90D9" stroke-width="2"/>
  <text x="240" y="765" text-anchor="middle" font-size="13" fill="#4A90D9" font-weight="bold">📦 Курьерская доставка</text>
  <rect x="400" y="735" width="300" height="50" rx="8" fill="white" stroke="#DDD" stroke-width="1"/>
  <text x="550" y="765" text-anchor="middle" font-size="13" fill="#666">🏢 Самовывоз с завода</text>

  <text x="90" y="810" font-size="13" fill="#888">Стоимость доставки: <tspan fill="#333" font-weight="bold">300 ₽</tspan> (бесплатно от 5000 ₽)</text>
  <text x="90" y="835" font-size="13" fill="#888">Срок доставки: <tspan fill="#333" font-weight="bold">1-2 рабочих дня</tspan></text>

  <!-- Privacy notice -->
  <rect x="90" y="855" width="18" height="18" rx="3" fill="#4A90D9" stroke="#4A90D9" stroke-width="1"/>
  <text x="98" y="869" font-size="12" fill="white" font-weight="bold">✓</text>
  <text x="115" y="870" font-size="12" fill="#555">Согласен с условиями обработки персональных данных</text>

  <!-- ========== ORDER SUMMARY (RIGHT) ========== -->
  <rect x="810" y="245" width="330" height="520" rx="12" fill="white" stroke="#DDD" stroke-width="1"/>

  <text x="840" y="280" font-size="16" fill="#333" font-weight="bold">Ваш заказ</text>
  <line x1="840" y1="290" x2="1110" y2="290" class="divider"/>

  <!-- Mini cart items -->
  <rect x="835" y="305" width="55" height="55" rx="4" class="placeholder"/>
  <text x="862" y="340" text-anchor="middle" font-size="9" fill="#AAA">Фото</text>
  <text x="900" y="325" font-size="12" fill="#333">LED Лампа E27 10W</text>
  <text x="900" y="342" font-size="11" fill="#888">2 × 200 ₽</text>
  <text x="1100" y="335" text-anchor="end" font-size="13" fill="#333" font-weight="bold">400 ₽</text>

  <rect x="835" y="370" width="55" height="55" rx="4" class="placeholder"/>
  <text x="862" y="405" text-anchor="middle" font-size="9" fill="#AAA">Фото</text>
  <text x="900" y="390" font-size="12" fill="#333">Филаментная A60</text>
  <text x="900" y="407" font-size="11" fill="#888">1 × 153 ₽</text>
  <text x="1100" y="400" text-anchor="end" font-size="13" fill="#333" font-weight="bold">153 ₽</text>

  <rect x="835" y="435" width="55" height="55" rx="4" class="placeholder"/>
  <text x="862" y="470" text-anchor="middle" font-size="9" fill="#AAA">Фото</text>
  <text x="900" y="455" font-size="12" fill="#333">Трубка T8 G13</text>
  <text x="900" y="472" font-size="11" fill="#888">3 × 320 ₽</text>
  <text x="1100" y="465" text-anchor="end" font-size="13" fill="#333" font-weight="bold">960 ₽</text>

  <line x1="840" y1="505" x2="1110" y2="505" class="divider"/>

  <text x="840" y="530" font-size="13" fill="#666">Товары (6 шт):</text>
  <text x="1100" y="530" text-anchor="end" font-size="13" fill="#333">1 513 ₽</text>
  <text x="840" y="555" font-size="13" fill="#666">Доставка:</text>
  <text x="1100" y="555" text-anchor="end" font-size="13" fill="#333">300 ₽</text>
  <text x="840" y="580" font-size="13" fill="#E74C3C">Скидка:</text>
  <text x="1100" y="580" text-anchor="end" font-size="13" fill="#E74C3C">−127 ₽</text>

  <line x1="840" y1="595" x2="1110" y2="595" class="divider"/>

  <text x="840" y="625" font-size="16" fill="#333" font-weight="bold">Итого:</text>
  <text x="1100" y="625" text-anchor="end" font-size="22" fill="#2C3E50" font-weight="bold">1 813 ₽</text>

  <rect x="835" y="650" width="270" height="50" class="btn-success"/>
  <text x="970" y="681" text-anchor="middle" font-size="16" fill="white" font-weight="bold">Оформить заказ ✓</text>





  <!-- ========== FOOTER ========== -->
  <rect x="0" y="1250" width="1200" height="150" class="footer-bg"/>
  <text x="60" y="1290" font-size="16" fill="white" font-weight="bold">ЛампоМаркет</text>
  <text x="60" y="1310" font-size="12" fill="#BDC3C7">© 2026 Завод-производитель светотехники</text>


</svg>
