  <text x="120" y="644" text-anchor="middle" font-size="11" fill="white">E27</text>
  <rect x="162" y="625" width="70" height="28" class="chip"/>
  <text x="197" y="644" text-anchor="middle" font-size="11" fill="#4A90D9">E14</text>
  <rect x="239" y="625" width="70" height="28" class="chip"/>
  <text x="274" y="644" text-anchor="middle" font-size="11" fill="#4A90D9">GU10</text>
