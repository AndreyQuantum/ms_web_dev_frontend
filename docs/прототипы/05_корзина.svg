  <rect x="563" y="565" width="45" height="30" fill="white" stroke="#CCC" stroke-width="1"/>
  <text x="585" y="586" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">3</text>
  <rect x="611" y="565" width="30" height="30" rx="4" fill="white" stroke="#CCC" stroke-width="1"/>
  <text x="626" y="586" text-anchor="middle" font-size="16" fill="#666">+</text>
  
  <text x="670" y="585" font-size="16" fill="#2C3E50" font-weight="bold">960 ₽</text>
  
  <text x="790" y="585" font-size="18" fill="#E74C3C" style="cursor:pointer">✕</text>

