  <text x="100" y="72" font-size="18" fill="white" font-weight="bold">ЛампоМаркет</text>
  <text x="100" y="88" font-size="10" fill="#BDC3C7">Завод-производитель</text>
  <text x="380" y="80" font-size="14" fill="#BDC3C7">Главная</text>
  <text x="470" y="80" font-size="14" fill="#BDC3C7">Каталог</text>
  <text x="560" y="80" font-size="14" fill="#BDC3C7">О компании</text>
  <text x="670" y="80" font-size="14" fill="#BDC3C7">Контакты</text>
  <rect x="1050" y="58" width="110" height="36" rx="18" fill="#4A90D9"/>
  <text x="1080" y="81" font-size="16">🛒</text>
  <text x="1100" y="80" font-size="13" fill="white" font-weight="bold">Корзина (3)</text>

  <!-- ========== BREADCRUMB ========== -->
