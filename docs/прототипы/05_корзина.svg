  <text x="1005" y="476" text-anchor="middle" font-size="16" fill="white" font-weight="bold">Оформить заказ →</text>

  <text x="905" y="520" font-size="11" fill="#888">Способы оплаты:</text>
  <text x="905" y="558" font-size="12" fill="#666">💰 Наличные/картой курьеру</text>
  
  <text x="905" y="605" class="small" fill="#AAA">Доставка рассчитывается</text>
