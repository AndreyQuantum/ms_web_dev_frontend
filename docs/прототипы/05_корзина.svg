  <!-- ========== FOOTER ========== -->
  <rect x="0" y="1010" width="1200" height="150" class="footer-bg"/>
  <text x="60" y="1050" font-size="16" fill="white" font-weight="bold">ЛампоМаркет</text>
  <text x="60" y="1070" font-size="12" fill="#BDC3C7">© 2026 Завод-производитель светотехники</text>
  <text x="400" y="1045" font-size="13" fill="#ECF0F1" font-weight="bold">Навигация</text>
  <text x="400" y="1065" font-size="12" fill="#BDC3C7">Каталог · О компании · Контакты</text>
  <text x="700" y="1045" font-size="13" fill="#ECF0F1" font-weight="bold">Контакты</text>
  <text x="700" y="1065" font-size="12" fill="#BDC3C7">📞 +7 (495) 123-45-67 · 📧 info@lampomarket.ru</text>


