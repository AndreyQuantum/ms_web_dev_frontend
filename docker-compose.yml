services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [app_net]
    restart: unless-stopped

  products_service:
    image: ghcr.io/andreyquantum/ms_web_dev/products_microservice:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/products_db
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    ports: ["127.0.0.1:8002:8002"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8002/health', timeout=2).status == 200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [app_net]
    restart: unless-stopped

  orders_service:
    image: ghcr.io/andreyquantum/ms_web_dev/orders_microservice:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/orders_db
      PRODUCTS_BASE_URL: http://products_service:8002
      PRODUCTS_REQUEST_TIMEOUT_S: "2.0"
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    ports: ["127.0.0.1:8003:8003"]
    depends_on:
      postgres:
        condition: service_healthy
      products_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8003/health', timeout=2).status == 200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [app_net]
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_PRODUCTS_API_URL: /api/products
        VITE_ORDERS_API_URL: /api/orders
    ports: ["127.0.0.1:8080:80"]
    depends_on: [products_service, orders_service]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks: [app_net]
    restart: unless-stopped

volumes:
  pgdata: {}

networks:
  app_net:
    driver: bridge
